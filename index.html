<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PerfumeShop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🌸 PerfumeShop</h1>
            <p>Descubre fragancias únicas para cada ocasión</p>
        </header>

        <main>
            <section class="perfumes">
                <div class="card">
                    <img src="https://cdn.pixabay.com/photo/2017/08/06/00/31/perfume-2580797_1280.jpg" alt="Perfume 1">
                    <h3>Chanel No. 5</h3>
                    <p>Precio: $120</p>
                    <button onclick="alert('Producto agregado al carrito')">Comprar</button>
                </div>

                <div class="card">
                    <img src="https://cdn.pixabay.com/photo/2016/03/05/19/02/perfume-1238690_1280.jpg" alt="Perfume 2">
                    <h3>Dior Sauvage</h3>
                    <p>Precio: $95</p>
                    <button onclick="alert('Producto agregado al carrito')">Comprar</button>
                </div>

                <div class="card">
                    <img src="https://cdn.pixabay.com/photo/2017/09/04/18/39/perfume-2716069_1280.jpg" alt="Perfume 3">
                    <h3>Versace Eros</h3>
                    <p>Precio: $85</p>
                    <button onclick="alert('Producto agregado al carrito')">Comprar</button>
                </div>
            </section>
        </main>

        <footer>
            <p>© 2026 PerfumeShop - Todos los derechos reservados</p>
        </footer>
    </div>
</body>
</html>
