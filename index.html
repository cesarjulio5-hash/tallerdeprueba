<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoMarket</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🚗 AutoMarket</h1>
            <p>Compra y vende autos de forma fácil</p>
        </header>

        <main>
            <section class="autos">
                <div class="card">
                    <img src="https://cdn.pixabay.com/photo/2012/05/29/00/43/car-49278_1280.jpg" alt="Auto 1">
                    <h3>Toyota Corolla 2020</h3>
                    <p>Precio: $15,000</p>
                    <button onclick="alert('Contacto con vendedor')">Comprar</button>
                </div>

                <div class="card">
                    <img src="https://cdn.pixabay.com/photo/2016/11/18/12/51/automobile-1834278_1280.jpg" alt="Auto 2">
                    <h3>Honda Civic 2019</h3>
                    <p>Precio: $13,500</p>
                    <button onclick="alert('Contacto con vendedor')">Comprar</button>
                </div>

                <div class="card">
                    <img src="https://cdn.pixabay.com/photo/2017/03/27/14/56/auto-2179220_1280.jpg" alt="Auto 3">
                    <h3>Ford Mustang 2021</h3>
                    <p>Precio: $28,000</p>
                    <button onclick="alert('Contacto con vendedor')">Comprar</button>
                </div>
            </section>
        </main>

        <footer>
            <p>© 2026 AutoMarket - Todos los derechos reservados</p>
        </footer>
    </div>
</body>
</html>
