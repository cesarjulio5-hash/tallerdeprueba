<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperMarket Express</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <header>
        <h1>🛒 SuperMarket Express</h1>
        <p>Compra fácil y rápido</p>
    </header>

    <main>

        <!-- BUSCADOR -->
        <input type="text" id="buscador" placeholder="Buscar producto..." onkeyup="buscarProducto()">

        <!-- PRODUCTOS -->
        <section class="productos" id="listaProductos">

            <div class="card">
                <h3>🍎 Manzana</h3>
                <p>$2</p>
                <button onclick="agregar('Manzana', 2)">Agregar</button>
            </div>

            <div class="card">
                <h3>🥛 Leche</h3>
                <p>$1.5</p>
                <button onclick="agregar('Leche', 1.5)">Agregar</button>
            </div>

            <div class="card">
                <h3>🍞 Pan</h3>
                <p>$1</p>
                <button onclick="agregar('Pan', 1)">Agregar</button>
            </div>

        </section>

        <!-- CARRITO -->
        <section class="carrito">
            <h2>🧾 Carrito</h2>
            <ul id="carritoLista"></ul>
            <p>Total: $<span id="total">0</span></p>
            <button onclick="pagar()">Pagar</button>
        </section>

    </main>

    <footer>
        <p>© 2026 SuperMarket Express</p>
    </footer>

</div>

<script>
    let total = 0;

    function agregar(nombre, precio) {
        let lista = document.getElementById("carritoLista");
        let item = document.createElement("li");
        item.textContent = nombre + " - $" + precio;
        lista.appendChild(item);

        total += precio;
        document.getElementById("total").textContent = total.toFixed(2);
    }

    function pagar() {
        if (total === 0) {
            alert("El carrito está vacío");
        } else {
            alert("Pago realizado con éxito 💳 Total: $" + total.toFixed(2));
            location.reload();
        }
    }

    function buscarProducto() {
        let input = document.getElementById("buscador").value.toLowerCase();
        let productos = document.querySelectorAll(".card");

        productos.forEach(producto => {
            let texto = producto.textContent.toLowerCase();
            producto.style.display = texto.includes(input) ? "block" : "none";
        });
    }
</script>

</body>
</html>
